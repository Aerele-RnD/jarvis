<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!-- viewport-fit=cover + the env(safe-area-inset-*) padding in index.css is
		     what keeps the composer off the iPhone home indicator in standalone mode.
		     interactive-widget=resizes-content: without it, Android Chrome's default
		     (resizes-visual) leaves the on-screen keyboard OVERLAYING the layout — the
		     100dvh shell never shrinks, so the bottom composer (and its send/stop
		     button) sit behind the keyboard and vanish the moment you tap to type.
		     resizes-content shrinks the layout viewport (and 100dvh) to the space
		     above the keyboard, so the composer rides up and stays on screen. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
		/>
		<title>Jarvis</title>

		<!-- iOS has no beforeinstallprompt and ignores the manifest's display mode;
		     Add to Home Screen only goes full-bleed with these. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Jarvis" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="mobile-web-app-capable" content="yes" />

		<!-- Tints the Android status bar / desktop title bar to match the app chrome. -->
		<meta name="theme-color" content="#F4F4F5" media="(prefers-color-scheme: light)" />
		<!-- The dark surface is the app's warm charcoal (tokens.ts dark.bg), not
		     black: the browser chrome must match the app it frames, or the status
		     bar sits as a black band above a grey screen. -->
		<meta name="theme-color" content="#262624" media="(prefers-color-scheme: dark)" />

		<!-- ?v=2: the icons changed from the blue "A" to the spark under the SAME
		     filenames, and Chrome caches favicons by URL — without a new URL the tab
		     keeps the stale icon indefinitely. Bump this whenever the icons change. -->
		<link rel="icon" type="image/png" sizes="192x192" href="/assets/jarvis/manifest/icon-192.png?v=2" />
		<link rel="apple-touch-icon" href="/assets/jarvis/manifest/apple-touch-180.png?v=2" />
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
