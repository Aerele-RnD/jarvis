# This field is a REGEX, not a glob, and it must be ANCHORED. `.git` here once
# silently excluded every workflow file - so check-yaml never validated the CI
# config, the one file where a YAML typo just makes things stop running.
#
# ESCAPING THE DOT DOES NOT FIX IT. `\.git` is still unanchored and `.github/`
# literally begins with `.git`, so it matches too - a second repo hit exactly
# that variant while rolling this config out. Only `^\.git/` is safe.
# Verify a change with:
#   python3 -c "import re; print(bool(re.compile(PATTERN).search('.github/workflows/ci.yml')))"
#
# `.git/` itself needs no entry at all: pre-commit is only ever handed TRACKED
# files, and nothing under `.git/` is tracked. The entry bought nothing and
# created the bug. node_modules stays as cheap insurance against a force-add.
exclude: '(^|/)node_modules/'
default_stages: [pre-commit]
fail_fast: false


repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: "jarvis.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      # Work lands on develop through a PR, never a direct commit. Branch
      # protection is a paid feature on private repos, so this is the local
      # equivalent - it holds on every machine that runs `pre-commit install`.
      - id: no-commit-to-branch
        args: ["--branch", "develop", "--branch", "beta"]
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        types_or: [javascript, vue, scss]
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                jarvis/public/dist/.*|
                .*node_modules.*|
                .*boilerplate.*|
                jarvis/templates/includes/.*|
                jarvis/public/js/lib/.*
            )$


  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.44.0
    hooks:
      - id: eslint
        types_or: [javascript]
        args: ['--quiet']
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                jarvis/public/dist/.*|
                cypress/.*|
                .*node_modules.*|
                .*boilerplate.*|
                jarvis/templates/includes/.*|
                jarvis/public/js/lib/.*
            )$

ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: false
