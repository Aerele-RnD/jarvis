# `^\.git/`, not a bare `.git`: unanchored, the `.` is a regex wildcard and
# `.git` matches the first four characters of `.github/...`, which silently
# excluded every workflow file - so check-yaml was never validating the CI
# config it most needs to validate.
exclude: 'node_modules|^\.git/'
default_stages: [pre-commit]
fail_fast: false


repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: "jarvis.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      # Work lands on develop through a PR, never a direct commit. Branch
      # protection is a paid feature on private repos, so this is the local
      # equivalent - it holds on every machine that runs `pre-commit install`.
      - id: no-commit-to-branch
        args: ["--branch", "develop", "--branch", "beta"]
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        types_or: [javascript, vue, scss]
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                jarvis/public/dist/.*|
                .*node_modules.*|
                .*boilerplate.*|
                jarvis/templates/includes/.*|
                jarvis/public/js/lib/.*
            )$


  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.44.0
    hooks:
      - id: eslint
        types_or: [javascript]
        args: ['--quiet']
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                jarvis/public/dist/.*|
                cypress/.*|
                .*node_modules.*|
                .*boilerplate.*|
                jarvis/templates/includes/.*|
                jarvis/public/js/lib/.*
            )$

ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: false
