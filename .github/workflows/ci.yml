name: CI

# Runs the jarvis test suite inside ghcr.io/aerele-rnd/jarvis-ci-base:v16, which already carries a
# built bench with frappe + erpnext + hrms (version-16) and /opt/ci/test_site.sql — a dump of a
# site with all three installed. Everything this job does is jarvis-specific.
#
# It used to build that environment from scratch on every run: ~5m26s of a ~7m21s run, byte-for-byte
# identical every time. Two things dominated it:
#
#   - `--skip-assets` gates build_assets() but NOT `yarn install`, which bench runs whenever an app
#     has a package.json. ~120s/run of npm work the Python suite never reads.
#   - `install-app erpnext hrms jarvis` cost 116s, of which jarvis was 2.5s.
#
# The from-scratch build still runs nightly in ci-nightly.yml, so upstream version-16 breakage is
# caught within a day — it just no longer sits in the PR critical path. If that job is red and this
# one is green, suspect upstream rather than the PR.
#
# What was left after that was one serial step: the test run itself, 304s of a 399s job. It is now
# sharded 4 ways via `bench run-parallel-tests`, taking the job to ~3m45s. The remaining ~90s is
# per-shard setup (image pull + site restore) that every leg pays again and that no amount of
# sharding removes. That floor is exactly why the shard count is 4 and not 8; see the `matrix:`
# comment for the measured split.
#
# Because each shard only covers about a quarter of the code, the coverage floor moved OUT of the
# test job and into the separate `coverage` job, which combines all four data files and gates once.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  # Never auto-cancel a develop run (cancelled reads as neutral, not failed → hides regressions).
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

permissions:
  contents: read
  packages: read   # to pull the base image from GHCR

jobs:
  # Runs the same .pre-commit-config.yaml the local hook runs, so the checks hold
  # even for a clone where nobody ran `pre-commit install`. Deliberately NOT in
  # the tests container: this needs only python + node, and it should report in
  # under a minute rather than waiting on a bench.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pre-commit/action@v3.0.1
        env:
          # no-commit-to-branch is a LOCAL guard: it inspects the checked-out
          # branch name. On `push: branches: [develop]` the checkout IS develop,
          # so leaving it on would fail this job on every merge. It has no
          # meaning server-side anyway - the PR requirement is what enforces it.
          SKIP: no-commit-to-branch
        with:
          extra_args: --all-files --show-diff-on-failure

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      # Never fail-fast. The default cancels the surviving shards on the first failure, so
      # you see one broken shard instead of all of them, and a cancelled leg reports as
      # neutral rather than failed. That is the same regression-hiding behaviour the
      # `cancel-in-progress` guard above already exists to avoid.
      fail-fast: false
      matrix:
        # 4 is the balance point, not an arbitrary pick. Frappe shards per test FILE
        # weighted by that file's `def test_` count, and its splitter is greedy and
        # order-preserving, so it starves the LAST shard as the count climbs. Measured
        # against this suite (176 files, 3560 tests):
        #
        #   N=2  [1782, 1778]                    spread    4
        #   N=4  [899, 891, 893, 877]            spread   22
        #   N=6  [636, 621, 598, 631, 594, 480]  spread  156
        #
        # Past 4, the ~90s of per-shard setup below (image pull + site restore, which every
        # leg pays again) also stops paying for itself: 6 shards costs 4 more runner-minutes
        # per run to save a further ~20s of wall clock.
        #
        # If you change this list, change --total-builds in the test step to match.
        shard: [1, 2, 3, 4]

    container:
      image: ghcr.io/aerele-rnd/jarvis-ci-base:v16
      # bench hard-exits as root (bench/cli.py -> change_uid: "You should not run this command as
      # root", exit 1). Actions job containers run as root by default. uid 1001 is both the `ci`
      # user baked into the image and the runner user that owns the mounted workspace.
      options: --user 1001
      env:
        HOME: /home/ci
        # ParallelTestRunner.print_result (frappe/parallel_test_runner.py) only fails the
        # process when CI is set:
        #
        #   if self.test_result.failures or self.test_result.errors:
        #       if os.environ.get("CI"):
        #           sys.exit(1)
        #
        # Actions does inject CI=true, so this is belt-and-braces. But the failure mode it
        # guards against is a shard reporting GREEN on a failing suite, which is the worst
        # outcome this workflow could produce. Set it explicitly rather than inherit it.
        CI: "true"
      # The package is currently PRIVATE. It is linked to this repo, so GITHUB_TOKEN + `packages:
      # read` pulls it on same-repo runs (verified). Credentials are harmless once it is public.
      #
      # Fork PRs are the gap: their GITHUB_TOKEN is forced read-only and scoped to the fork, and
      # pulling a private GHCR package with it is unreliable. If this repo ever takes an external
      # PR, make the package public — that path needs no credentials at all.
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    services:
      # Under `container:`, services are reachable by service id rather than 127.0.0.1, and the
      # `ports:` mappings the from-scratch workflow needs are unnecessary here.
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          # Passwordless mysql@localhost user so `healthcheck.sh --su-mysql --connect` works.
          MARIADB_MYSQL_LOCALHOST_USER: "1"
        options: >-
          --health-cmd="healthcheck.sh --su-mysql --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20 --health-start-period=40s
      redis:
        image: redis:7
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - name: Clone jarvis
        uses: actions/checkout@v4
        with:
          path: app

      - name: Record what this run actually tested against
        working-directory: /opt/frappe-bench
        run: |
          # :v16 is a mutable tag, rebuilt nightly. Two runs an hour apart can therefore test
          # against different upstream commits, and the tag is overwritten before you could go
          # look. Without this, a green check is unauditable after the fact.
          {
            echo "### Baked upstream revisions"
            echo
            for app in frappe erpnext hrms; do
              echo "- ${app}: \`$(git -C "apps/${app}" rev-parse HEAD)\`"
            done
          } | tee -a "${GITHUB_STEP_SUMMARY}"

      - name: Point the baked bench at the service containers
        working-directory: /opt/frappe-bench
        run: |
          bench set-config -g db_host mariadb
          # Distinct Redis DB indices per role — Frappe assumes cache/queue/socketio do not share
          # a keyspace.
          bench set-config -g redis_cache "redis://redis:6379/0"
          bench set-config -g redis_queue "redis://redis:6379/1"
          bench set-config -g redis_socketio "redis://redis:6379/2"

      - name: Add jarvis to the bench
        working-directory: /opt/frappe-bench
        run: |
          cp -r "${GITHUB_WORKSPACE}/app" apps/jarvis
          # Deliberately NOT `bench get-app`: that runs `yarn install --check-files` whenever
          # package.json exists (bench/app.py), which here pulls @google/gemini-cli and, via
          # postinstall, the whole Vue SPA's deps — 24s the Python suite never reads.
          ./env/bin/pip install -e apps/jarvis
          if ! grep -qxF jarvis sites/apps.txt; then
            # apps.txt ships as "frappe\nerpnext\nhrms" with NO trailing newline. A naive append
            # yields "hrmsjarvis" and frappe dies with ModuleNotFoundError: No module named
            # 'hrmsjarvis'. Verified against the real image; do not remove this guard.
            [ -z "$(tail -c1 sites/apps.txt)" ] || echo >> sites/apps.txt
            echo jarvis >> sites/apps.txt
          fi

      - name: Create test site from the baked dump
        working-directory: /opt/frappe-bench
        run: |
          # --source-sql (frappe/commands/site.py) creates the DB + user + site_config.json and
          # loads the dump, which already has frappe/erpnext/hrms installed. Replaces ~113s of
          # `install-app erpnext hrms` with a ~6s restore. `bench` defines no new-site of its own,
          # so this forwards to frappe's, which is where --source-sql lives.
          bench new-site test_site \
            --db-host mariadb \
            --mariadb-user-host-login-scope='%' \
            --mariadb-root-password root \
            --db-root-username root \
            --admin-password admin \
            --source-sql /opt/ci/test_site.sql
          bench --site test_site install-app jarvis
          bench --site test_site set-config allow_tests true
          # The full suite creates far more than Frappe's default 60-users/60-min
          # limit (throttle_user_creation), so a mid-suite fixture insert otherwise
          # hits "Throttled" (flaky, depends on which module crosses the threshold).
          # -p stores an INT: throttle_user_creation compares count > limit, and a
          # string limit raises "TypeError: '>' not supported between int and str".
          bench --site test_site set-config -p throttle_user_limit 100000

      - name: Assert the restored site is what we think it is
        working-directory: /opt/frappe-bench
        run: |
          # Cheap guard against a silently-stale or partial image: if erpnext/hrms did not come
          # back from the dump, the tier-2 tests would fail later in a much more confusing way.
          #
          # Take the JSON line specifically, and leave stderr on the console. Merging stderr into
          # stdout and taking `tail -1` would capture any late warning (e.g. a ResourceWarning at
          # interpreter teardown) instead of the JSON, and fail a perfectly healthy site.
          apps=$(bench --site test_site execute frappe.get_installed_apps | grep -m1 '^\[') || {
            echo "could not parse installed apps from 'bench execute' output"; exit 1; }
          echo "installed apps: ${apps}"
          for a in frappe erpnext hrms jarvis; do
            echo "${apps}" | grep -q "\"${a}\"" || { echo "missing app: ${a}"; exit 1; }
          done

      - name: Run tests + coverage (shard ${{ matrix.shard }} of 4)
        working-directory: /opt/frappe-bench
        run: |
          # coverage + gevent are already in the image's venv (gevent is needed by
          # jarvis/realtime/handlers.py with socketio_backend=python, and its tests).
          #
          # The coverage flag is spelled --with-coverage on THIS command. run-tests spells
          # the same thing --coverage (frappe/commands/testing.py). They are two different
          # click commands; do not "fix" one to match the other.
          bench --site test_site run-parallel-tests \
            --app jarvis \
            --build-number ${{ matrix.shard }} \
            --total-builds 4 \
            --with-coverage

      - name: Stash this shard's coverage under a non-hidden name
        working-directory: /opt/frappe-bench
        run: |
          # frappe's CodeCoverage writes the default data file, which lands at
          # sites/.coverage. Renaming off the leading dot is deliberate: upload-artifact@v4
          # EXCLUDES hidden files by default, so uploading `.coverage.N` silently produces
          # an empty artifact and the combine job below then fails on "No data to report"
          # long after the real cause scrolled past.
          mv sites/.coverage "sites/coverage-data-${{ matrix.shard }}"

      - name: Upload this shard's coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.shard }}
          path: /opt/frappe-bench/sites/coverage-data-${{ matrix.shard }}
          retention-days: 1
          if-no-files-found: error

  # The coverage floor cannot be enforced inside a shard: each one exercises roughly a
  # quarter of the code, so all four would "fail" a 85% gate. Combine first, gate once.
  #
  # `needs: tests` against a matrix runs this only when EVERY leg succeeded, which is the
  # behaviour we want. A failing shard should surface as one honest test failure, not as a
  # test failure plus a bogus coverage failure caused by the missing quarter.
  #
  # Deliberately NOT in the base image: this needs python and `coverage` and nothing else
  # from the bench, so running it here skips a second 65s image pull.
  coverage:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install coverage
        run: pip install coverage

      - name: Download every shard's coverage
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: covdata

      - name: Combine and enforce the floor
        run: |
          # All four shards ran the same image, so their data files agree on one absolute
          # source path: /opt/frappe-bench/apps/jarvis. `coverage report` has to read those
          # sources to count statements, so the checkout is placed at that exact path.
          # Cheaper and far less fragile than a [paths] remap in a .coveragerc.
          sudo mkdir -p /opt/frappe-bench/apps
          sudo cp -r app /opt/frappe-bench/apps/jarvis

          cd covdata
          echo "shard data files:"; ls -l

          # Guard against a silently-partial combine. Four shards must contribute four
          # files; anything less means an upload was dropped and the resulting percentage
          # would be meaningless but still plausible-looking.
          found=$(ls coverage-data-* 2>/dev/null | wc -l)
          [ "${found}" -eq 4 ] || { echo "expected 4 shard files, got ${found}"; exit 1; }

          coverage combine coverage-data-*
          # Enforced coverage floor. Baseline on 2026-07-02 was 87% (incl. test files, with
          # the 9 quarantined tests skipped). Ratchet UP over time; never down.
          coverage report --fail-under=85
