<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Module icon. Brand gradient (#6e8bff -> #8b5cf6, matching JarvisMark);
       keeps its own letter so the Desk sidebar's modules stay distinguishable. -->
  <defs>
    <linearGradient id="jarvis-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6e8bff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#jarvis-brand)"/>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">C</text>
</svg>
